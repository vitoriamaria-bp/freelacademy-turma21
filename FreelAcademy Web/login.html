<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | FreelAcademy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body>

    <div class="auth-page">
        <div class="auth-bg-image"></div>
        <div class="auth-overlay"></div>

        <div class="auth-box">
            
            <div class="auth-header">
                <a href="index.html" class="logo-auth">
                    <span>Fr<span style="color: var(--secondary);">ee</span>lAcademy</span>
                    <img src="assets/img/logo-passaro-original.svg" alt="Pássaro FreelAcademy">
                </a>
                <p>Bem-vindo de volta! Acesse sua conta.</p>
            </div>

            <form id="formLogin">
                
                <label class="form-label">Acessar como:</label>
                <div class="type-selector" style="margin-bottom: 20px;">
                    <label class="type-option">
                        <input type="radio" name="tipoAcesso" value="freelancer" checked>
                        <div class="type-box">
                            <i class="fas fa-laptop-code"></i>
                            <span>Freelancer</span>
                        </div>
                    </label>
                    <label class="type-option">
                        <input type="radio" name="tipoAcesso" value="cliente">
                        <div class="type-box">
                            <i class="fas fa-briefcase"></i>
                            <span>Cliente</span>
                        </div>
                    </label>
                </div>

                <div class="form-group">
                    <label class="form-label">E-mail</label>
                    <input type="email" id="emailLogin" class="form-input" placeholder="seu@email.com" required>
                </div>

                <div class="form-group" style="margin-bottom: 10px;">
                    <label class="form-label">Senha</label>
                    <input type="password" id="senhaLogin" class="form-input" placeholder="••••••••" required>
                </div>

                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                    <div class="check-wrapper" style="margin: 0;">
                        <input type="checkbox" id="lembrar-mim">
                        <label for="lembrar-mim">Lembrar de mim</label>
                    </div>
                    <a href="recuperar-senha.html" style="font-size: 0.9rem; color: var(--secondary); text-decoration: none; font-weight: 600;">Esqueci a senha</a>
                </div>

                <div class="check-wrapper">
                    <input type="checkbox" required id="login-termos">
                    <label for="login-termos">
                        Li e concordo com os <a href="termos.html" target="_blank">Termos de Uso</a> e a <a href="privacidade.html" target="_blank">Política de Privacidade</a>.
                    </label>
                </div>

                <button type="submit" class="btn-submit" style="margin-top: 10px;">Entrar</button>
            </form>

            <div class="auth-footer">
                Não tem conta? <a href="cadastro.html">Cadastre-se</a>
                <div style="margin-top: 15px; font-size: 0.75rem; color: #aaa;">
                    &copy; 2025 FreelAcademy Tecnologia.
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/scripts.js"></script>
</body>
</html>
