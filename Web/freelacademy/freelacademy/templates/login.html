{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | FreelAcademy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/global.css' %}">
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>
    <div class="auth-page">
        <div class="auth-bg-image"></div>
        <div class="auth-overlay"></div>

        <div class="auth-box">
            <div class="auth-header">
                <a href="{% url 'index' %}" class="logo-auth">
                    <span>Fr<span style="color: var(--secondary);">ee</span>lAcademy</span>
                    <img src="{% static 'img/logo-passaro-original.svg' %}" alt="Pássaro FreelAcademy">
                </a>
                <p>Bem-vindo de volta! Acesse sua conta.</p>
            </div>

            {% if messages %}
                <div id="login-msg-box" style="margin-bottom: 20px;">
                    {% for message in messages %}
                        <div style="padding: 12px; border-radius: 4px; color: white; text-align: center; font-size: 0.9rem; background-color: {% if message.tags == 'error' %}#d93025{% else %}#1e8e3e{% endif %};">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
                <script>
                    setTimeout(function() {
                        const box = document.getElementById('login-msg-box');
                        if (box) {
                            box.style.transition = "opacity 0.6s ease";
                            box.style.opacity = "0";
                            setTimeout(() => box.remove(), 600);
                        }
                    }, 4000);
                </script>
            {% endif %}

            <form id="formLoginDjango" method="POST" action="{% url 'login' %}">
                {% csrf_token %}
                
                <label class="form-label">Eu sou:</label>
                <div class="type-selector" style="margin-bottom: 20px;">
                    <label class="type-option">
                        <input type="radio" name="tipoAcesso" value="freelancer" checked>
                        <div class="type-box">
                            <i class="fas fa-laptop-code"></i>
                            <span>Freelancer</span>
                        </div>
                    </label>
                    <label class="type-option">
                        <input type="radio" name="tipoAcesso" value="cliente">
                        <div class="type-box">
                            <i class="fas fa-briefcase"></i>
                            <span>Cliente</span>
                        </div>
                    </label>
                </div>

                <div class="form-group">
                    <label class="form-label">E-mail</label>
                    <input type="email" name="email" class="form-input" placeholder="seu@email.com" required>
                </div>

                <div class="form-group" style="margin-bottom: 10px;">
                    <label class="form-label">Senha</label>
                    <input type="password" name="senha" class="form-input" placeholder="••••••••" required>
                </div>

                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                    <div class="check-wrapper" style="margin: 0;">
                        <input type="checkbox" id="lembrar-mim">
                        <label for="lembrar-mim">Lembrar de mim</label>
                    </div>
                    <a href="{% url 'recuperar_senha' %}" style="font-size: 0.9rem; color: var(--secondary); text-decoration: none; font-weight: 600;">Esqueci a senha</a>
                </div>

                <button type="submit" class="btn-submit" style="margin-top: 10px;">Entrar</button>
            </form>

            <div class="auth-footer">
                Não tem conta? <a href="{% url 'cadastro' %}">Cadastre-se</a>
            </div>
        </div>
    </div>
    <script src="{% static 'js/scripts.js' %}"></script>
</body>
</html>
