{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | FreelAcademy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/global.css' %}">
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>
    <div class="auth-page">
        <div class="auth-bg-image"></div>
        <div class="auth-overlay"></div>

        <div class="auth-box">
            <div class="auth-header">
                <a href="{% url 'index' %}" class="logo-auth">
                    <span>Fr<span style="color: var(--secondary);">ee</span>lAcademy</span>
                    <img src="{% static 'img/logo-passaro-original.svg' %}" alt="Pássaro FreelAcademy">
                </a>
                <p>Crie sua conta segura.</p>
            </div>

            {% if messages %}
                <div id="msg-container" style="margin-bottom: 20px;">
                    {% for message in messages %}
                        <div style="padding: 12px; border-radius: 4px; color: white; text-align: center; font-size: 0.9rem; background-color: {% if message.tags == 'error' %}#d93025{% else %}#1e8e3e{% endif %};">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
                <script>
                    setTimeout(function() {
                        const container = document.getElementById('msg-container');
                        if (container) {
                            container.style.transition = "opacity 0.6s ease";
                            container.style.opacity = "0";
                            setTimeout(() => container.remove(), 600);
                        }
                    }, 4000);
                </script>
            {% endif %}

            <form id="formCadastroDjango" method="POST" action="{% url 'cadastro' %}">
                {% csrf_token %}
                
                <label class="form-label">Eu sou:</label>
                <div class="type-selector" style="margin-bottom: 20px;">
                    <label class="type-option">
                        <input type="radio" name="perfil" value="freelancer" checked>
                        <div class="type-box">
                            <i class="fas fa-laptop-code"></i>
                            <span>Freelancer</span>
                        </div>
                    </label>
                    <label class="type-option">
                        <input type="radio" name="perfil" value="cliente">
                        <div class="type-box">
                            <i class="fas fa-briefcase"></i>
                            <span>Cliente</span>
                        </div>
                    </label>
                </div>

                <div class="form-group">
                    <label class="form-label">Nome Completo</label>
                    <input type="text" name="nomeCompleto" class="form-input" placeholder="Seu nome" required>
                </div>

                <div class="form-group">
                    <label class="form-label">E-mail</label>
                    <input type="email" name="email" class="form-input" placeholder="seu@email.com" required>
                </div>

                <div style="display: flex; gap: 15px;">
                    <div class="form-group" style="flex: 1;">
                        <label class="form-label">CPF / CNPJ</label>
                        <input type="text" name="cpf_cnpj" class="form-input" placeholder="Apenas números" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label class="form-label">Telefone</label>
                        <input type="text" name="telefone" class="form-input" placeholder="(DD) 90000-0000" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Senha</label>
                    <input type="password" name="senha" class="form-input" placeholder="Mínimo 8 caracteres" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Confirmar Senha</label>
                    <input type="password" name="senha_confirma" class="form-input" placeholder="Repita sua senha" required>
                </div>

                <div class="check-wrapper">
                    <input type="checkbox" name="lgpd" required id="lgpd-check">
                    <label for="lgpd-check">
                        Li e concordo com os <a href="{% url 'termos' %}" target="_blank">Termos</a>.
                    </label>
                </div>

                <button type="submit" class="btn-submit" style="margin-top: 10px;">Finalizar Cadastro</button>
            </form>

            <div class="auth-footer">
                Já tem conta? <a href="{% url 'login' %}">Entrar</a>
            </div>
        </div>
    </div>
    <script src="{% static 'js/scripts.js' %}"></script>
</body>
</html>
