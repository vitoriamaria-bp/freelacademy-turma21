<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar | FreelAcademy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body>

    <div class="auth-page">
        <div class="auth-bg-image"></div>
        <div class="auth-overlay"></div>

        <div class="auth-box">
            
            <div class="auth-header">
                <a href="index.html" class="logo-auth">
                    <span>Fr<span style="color: var(--secondary);">ee</span>lacademy</span>
                    <img src="assets/img/logo-passaro-original.svg" alt="Pássaro FreelAcademy">
                </a>
                <p>Esqueceu sua senha? Não se preocupe, insira seu e-mail e enviaremos as instruções de recuperação.</p>
            </div>

            <form id="formRecuperar">
                <div class="form-group">
                    <label class="form-label">Seu E-mail</label>
                    <input type="email" id="emailRecuperacao" class="form-input" placeholder="seu@email.com" required>
                </div>

                <button type="submit" class="btn-submit">Enviar Link de Recuperação</button>
            </form>

            <div class="auth-footer">
                Lembrou da senha? <a href="login.html">Voltar para o Login</a>
                <div style="margin-top: 15px; font-size: 0.75rem; color: #aaa;">
                    &copy; 2026 FreelAcademy Tecnologia.
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/scripts.js"></script>
</body>
</html>
