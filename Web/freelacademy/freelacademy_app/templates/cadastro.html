{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | FreelAcademy</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

    {% for message in messages %}
        <p style="color: red;">{{ message }}</p>
    {% endfor %}

    <div class="auth-page">
        <div class="auth-bg-image"></div>
        <div class="auth-overlay"></div>

        <div class="auth-box">
            
            <div class="auth-header">
                <a class="logo-auth">
                    <span>Fr<span style="color: var(--secondary);">ee</span>lacademy</span>
                    <img src="{% static 'resources/logo-passaro-original.svg' %}">
                </a>
                <p>Crie sua conta GRATUITA em segundos!</p>
            </div>

            <form method="post">
                {% csrf_token %}

                <div class="form-group">
                    <label class="form-label">Nome Completo</label>
                    <input type="text" class="form-input" name="username" placeholder="Seu nome" required>
                </div>

                <div class="form-group">
                    <label class="form-label">E-mail</label>
                    <input type="email" class="form-input" name="email" placeholder="seu@gmail.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Senha</label>
                    <input type="password" class="form-input" name="password" placeholder="Mínimo 8 caracteres" required>
                </div>

                <div class="check-wrapper">
                    <input type="checkbox" required id="lgpd-check">
                    <label for="lgpd-check">
                        Li e concordo com os <a href="#">Termos de Uso</a> e a <a href="#">Política de Privacidade</a>.
                    </label>
                </div>

                <button type="submit" class="btn-submit">Criar Conta</button>
            </form>
            <br>
            <a href="/" class="linknu"> Já tenho conta </a>
            <!-- <div class="auth-footer">
                Já tem cadastro? <a href="login.html">Fazer Login</a>
                <div style="margin-top: 15px; font-size: 0.75rem; color: #aaa;">
                    &copy; 2025 FreelAcademy Tecnologia.
                </div> -->
            </div>
        </div>
    </div>

</body>
</html>
