{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | FreelAcademy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/global.css' %}">
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>

    <div class="auth-page">
        <div class="auth-bg-image"></div>
        <div class="auth-overlay"></div>

        <div class="auth-box">
            <div class="auth-header">
                <a href="{% url 'index' %}" class="logo-auth">
                    <span>Fr<span style="color: var(--secondary);">ee</span>lacademy</span>
                    <img src="{% static 'img/logo-passaro-original.svg' %}" alt="Pássaro">
                </a>
                <p>Crie sua conta gratuita e segura.</p>
            </div>

            {% if messages %}
                <div style="margin-bottom: 20px;">
                    {% for message in messages %}
                        <div style="padding: 10px; border-radius: 4px; color: white; background-color: {% if message.tags == 'error' %}#d93025{% else %}#1e8e3e{% endif %}; font-size: 0.9rem;">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}

            <form id="formCadastroDjango" method="POST" action="{% url 'cadastro' %}">
                {% csrf_token %}
                
                <label class="form-label">Eu quero:</label>
                <div class="type-selector">
                    <label class="type-option">
                        <input type="radio" name="perfil" value="freelancer" checked>
                        <div class="type-box">
                            <i class="fas fa-laptop-code"></i>
                            <span>Trabalhar</span>
                        </div>
                    </label>
                    <label class="type-option">
                        <input type="radio" name="perfil" value="cliente">
                        <div class="type-box">
                            <i class="fas fa-briefcase"></i>
                            <span>Contratar</span>
                        </div>
                    </label>
                </div>

                <div class="form-group">
                    <label class="form-label">Nome Completo</label>
                    <input type="text" name="nomeCompleto" class="form-input" placeholder="Seu nome" required>
                </div>

                <div class="form-group">
                    <label class="form-label">E-mail</label>
                    <input type="email" name="email" class="form-input" placeholder="seu@email.com" required>
                </div>

                <div style="display: flex; gap: 15px;">
                    <div class="form-group" style="flex: 1;">
                        <label class="form-label">CPF / CNPJ</label>
                        <input type="text" name="cpf_cnpj" class="form-input" placeholder="Apenas números" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label class="form-label">Telefone</label>
                        <input type="text" name="telefone" class="form-input" placeholder="(DD) 90000-0000" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Senha de Acesso</label>
                    <input type="password" name="senha" class="form-input" placeholder="Mínimo 8 caracteres" required>
                </div>

                <div class="check-wrapper">
                    <input type="checkbox" name="lgpd" required id="lgpd-check">
                    <label for="lgpd-check">
                        Li e concordo com o processamento dos meus dados conforme os <a href="{% url 'termos' %}" target="_blank">Termos de Uso</a> e a <a href="{% url 'privacidade' %}" target="_blank">Política de Privacidade</a>.
                    </label>
                </div>

                <button type="submit" class="btn-submit">Criar Conta Segura</button>
            </form>

            <div class="auth-footer">
                Já tem cadastro? <a href="{% url 'login' %}">Fazer Login</a>
            </div>
        </div>
    </div>
    <script src="{% static 'js/scripts.js' %}"></script>
</body>
</html>
