{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Ajuda | FreelAcademy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/global.css' %}">
    <link rel="stylesheet" href="{% static 'css/home.css' %}">
</head>
<body style="background: #f8faff;">
    <header class="header-home">
        <div class="container">
            <nav>
                <a href="{% url 'home' %}" class="logo-standard">
                    <span style="color: var(--primary);">Fr<span style="color: var(--secondary);">ee</span>lacademy</span>
                </a>
                <a href="{% url 'home' %}" class="btn-login"><i class="fas fa-arrow-left"></i> Voltar</a>
            </nav>
        </div>
    </header>

    <main class="container" style="margin-top: 150px; margin-bottom: 100px;">
        <h1 style="color: var(--primary); text-align: center; margin-bottom: 40px;">Como podemos ajudar?</h1>
        <div style="background: white; padding: 30px; border-radius: 15px; border: 1px solid #eee;">
            <h3 style="color: var(--primary);">Como funciona o App Desktop?</h3>
            <p style="margin-top: 10px; color: #666;">O App monitora o progresso do freelancer e garante que o código seja entregue com segurança ao banco de dados.</p>
        </div>
    </main>

    <footer class="footer-profissional">
        <div class="container">
            <div class="row-footer">
                <div class="footer-col">
                    <h4>Navegação</h4>
                    <ul><li><a href="{% url 'home' %}">Home</a></li></ul>
                </div>
                <div class="footer-col">
                    <h4>Localização</h4>
                    <p style="color: #bbb;"><i class="fas fa-map-marker-alt"></i> Taboão da Serra, SP</p>
                </div>
            </div>
            <div class="footer-bottom" style="text-align: center; margin-top: 40px; border-top: 1px solid #333; padding-top: 20px;">
                <p style="color: #888;">&copy; 2025 FreelAcademy</p>
            </div>
        </div>
    </footer>
</body>
</html>
